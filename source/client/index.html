<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b0e13" />
  <title>LynGame Editor</title>
</head>

<body>
  <div id="root"></div>
  <script>
    (function () {
      var THEMES = ["retro-violet", "terminal-green", "sunset-pixel", "ice-blue"];
      var stored = localStorage.getItem("lyngame-theme");
      document.documentElement.setAttribute(
        "data-theme",
        THEMES.includes(stored) ? stored : "retro-violet"
      );
    })();
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
