<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Engine</title>
  <link rel="stylesheet" href="/styles.css">
</head>

<body>
  <div id="sidebar">
    <h2>Projects</h2>
    <div id="project-list"></div>

    <form id="new-project-form">
      <input id="new-project-name" placeholder="project name" required>
      <button type="submit">New</button>
    </form>

    <div id="editor-panel" class="hidden">
      <h2 id="editor-project-name"></h2>

      <div id="folder-tabs">
        <button data-folder="scenes" class="tab active">Scenes</button>
        <button data-folder="components" class="tab">Components</button>
        <button data-folder="scripts" class="tab">Scripts</button>
      </div>

      <div id="file-list"></div>

      <form id="new-file-form">
        <input id="new-file-name" placeholder="filename.js">
        <button type="submit">New</button>
      </form>
    </div>

    <div id="status">idle</div>
  </div>

  <div id="main-area">
    <div id="editor-toolbar" class="hidden">
      <span id="editing-filename"></span>
      <button id="save-file-btn">Save</button>
      <button id="run-btn">Run Project</button>
    </div>
    <textarea id="code-editor" class="hidden" spellcheck="false"></textarea>
    <iframe id="game-frame"></iframe>
  </div>

  <script type="module" src="/main.js"></script>
</body>

</html>
